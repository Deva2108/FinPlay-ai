services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: stocksdb
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: spring-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/stocksdb?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-rootpassword}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_JPA_DIALECT=org.hibernate.dialect.MySQLDialect
      - JWT_SECRET=${JWT_SECRET:-superSecretProductionKey123}
      - STOCK_API_KEY=${STOCK_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
