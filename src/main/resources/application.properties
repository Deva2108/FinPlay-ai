# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# NewsAPI Configuration
news.api.key=${NEWS_API_KEY}
news.api.base-url=https://newsapi.org/v2

# Stock Market API (Finnhub)
finnhub.api.key=${FINNHUB_API_KEY}
finnhub.base-url=https://finnhub.io/api/v1

# Stock Market API (Financial Modeling Prep)
stock.api.key=${STOCK_API_KEY}
stock.api.base-url=https://financialmodelingprep.com/api/v3

# AI Gemini API
gemini.api.key=${GEMINI_API_KEY}

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger Configuration
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
